<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GridFleet</title>
    </head>
    <body>
        <div id="app">
            <div id="status-bar">
                <div class="status-item" id="player-ships-remaining">
                    Your Ships: <span class="count">0</span>
                </div>

                <div class="status-item" id="enemy-ships-remaining">
                    Enemy Ships: <span class="count">0</span>
                </div>
            </div>

            <div id="game-container">
                <div class="board-container">
                    <h2>Your Board</h2>
                    <div class="board" id="player-board"></div>
                </div>

                <div class="board-container">
                    <h2>Enemy Board</h2>
                    <div class="board" id="enemy-board"></div>
                </div>
            </div>
        </div>
    </body>
</html>
